<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Idle 2048 — Wireframes</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Kalam:wght@400;700&family=Patrick+Hand&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600;6..72,700&family=Source+Sans+3:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #fbf6ee;
    --paper-2: #f4ecdc;
    --ink: #2b2a26;
    --ink-soft: #5d5a52;
    --ink-faint: #9b958a;
    --rule: #2b2a26;
    --pink: #f4c8c4;
    --peach: #f5d8b8;
    --butter: #f3e2a3;
    --mint: #c8e0c4;
    --sky: #c4d8ea;
    --lilac: #d8cae6;
    --coral: #e8a59c;
    --sage: #a5b89e;
    --hand: 'Kalam', cursive;
    --note: 'Caveat', cursive;
    --label: 'Patrick Hand', cursive;
    --serif: 'Newsreader', Georgia, serif;
    --sans: 'Source Sans 3', system-ui, sans-serif;
    --mono: 'JetBrains Mono', monospace;
    --tile-num: 'Source Sans 3', system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); font-family: var(--hand); }
  body {
    background-image:
      radial-gradient(1200px 600px at 10% 0%, #fcf2dd 0%, transparent 60%),
      radial-gradient(1000px 500px at 90% 100%, #f0e3cf 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent 0 31px, rgba(43,42,38,.05) 31px 32px);
    min-height: 100vh;
  }
  .app {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px 28px 80px;
  }
  /* Header */
  header.title {
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 24px; flex-wrap: wrap;
    border-bottom: 2px dashed var(--rule);
    padding-bottom: 14px;
    margin-bottom: 18px;
  }
  header.title h1 {
    font-family: var(--serif);
    font-weight: 600;
    font-size: clamp(36px, 5vw, 52px);
    line-height: .95;
    margin: 0;
    letter-spacing: -1px;
  }
  header.title h1 .scribble {
    font-family: var(--note);
    font-weight: 700;
    color: var(--coral);
  }
  header.title h1 small {
    display: block;
    font-family: var(--sans);
    font-weight: 400;
    font-size: 13px;
    color: var(--ink-soft);
    margin-top: 8px;
    letter-spacing: 0;
  }
  header.title .meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-soft);
    text-align: right;
    line-height: 1.6;
  }
  header.title .meta b { color: var(--ink); }

  /* Intro / system notes */
  .notes {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 22px;
  }
  .notes .card {
    border: 1.5px solid var(--rule);
    border-radius: 14px;
    padding: 10px 12px;
    background: var(--paper-2);
    box-shadow: 2px 2px 0 var(--rule);
    transform: rotate(-.3deg);
  }
  .notes .card:nth-child(2) { transform: rotate(.4deg); background: var(--butter); }
  .notes .card:nth-child(3) { transform: rotate(-.2deg); background: var(--mint); }
  .notes .card:nth-child(4) { transform: rotate(.3deg); background: var(--lilac); }
  .notes h4 {
    font-family: var(--serif);
    font-weight: 600;
    margin: 0 0 4px;
    font-size: 18px;
    letter-spacing: -.3px;
  }
  .notes p { margin: 0; font-family: var(--sans); font-size: 13px; color: var(--ink); line-height: 1.4; }

  /* Tabs */
  .tabs {
    display: flex; gap: 8px; flex-wrap: wrap;
    border-bottom: 2px solid var(--rule);
    margin-bottom: 18px;
    padding-bottom: 0;
  }
  .tab {
    font-family: var(--sans);
    font-weight: 500;
    font-size: 14px;
    padding: 8px 14px 6px;
    border: 1.5px solid var(--rule);
    border-bottom: none;
    border-radius: 12px 12px 0 0;
    background: var(--paper-2);
    cursor: pointer;
    transform: translateY(2px) rotate(-.4deg);
    color: var(--ink-soft);
    box-shadow: 2px -2px 0 rgba(43,42,38,.08);
  }
  .tab:nth-child(2n) { transform: translateY(2px) rotate(.5deg); }
  .tab.active {
    background: var(--paper);
    color: var(--ink);
    border-bottom: 2px solid var(--paper);
    margin-bottom: -2px;
    box-shadow: 2px -2px 0 var(--rule);
  }
  .tab .num { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); margin-right: 6px; }

  /* Direction switcher */
  .directions {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-bottom: 14px; align-items: center;
  }
  .directions .lbl {
    font-family: var(--mono); font-size: 11px; color: var(--ink-soft);
    text-transform: uppercase; letter-spacing: 1px;
    margin-right: 8px;
  }
  .dirbtn {
    font-family: var(--sans);
    font-weight: 500;
    font-size: 12px;
    padding: 4px 10px;
    border: 1.5px solid var(--rule);
    border-radius: 999px;
    background: var(--paper);
    cursor: pointer;
    color: var(--ink);
  }
  .dirbtn.active {
    background: var(--ink);
    color: var(--paper);
  }

  /* Sheet */
  .sheet {
    border: 2px solid var(--rule);
    border-radius: 18px;
    background: var(--paper);
    padding: 18px;
    box-shadow: 4px 4px 0 var(--rule);
    position: relative;
  }
  .sheet::before {
    content: "";
    position: absolute; left: 18px; top: -10px; width: 60px; height: 18px;
    background: rgba(244,200,196,.6);
    border: 1.5px solid var(--rule);
    border-radius: 2px;
    transform: rotate(-3deg);
  }
  .sheet-head {
    display: flex; justify-content: space-between; align-items: baseline;
    border-bottom: 1.5px dashed var(--rule);
    padding-bottom: 8px; margin-bottom: 14px;
  }
  .sheet-head h2 {
    font-family: var(--serif);
    font-weight: 600;
    margin: 0;
    font-size: 28px;
    line-height: 1;
    letter-spacing: -.5px;
  }
  .sheet-head .crumb { font-family: var(--mono); font-size: 11px; color: var(--ink-soft); }

  /* Hand-drawn primitives */
  .box {
    border: 1.75px solid var(--rule);
    border-radius: 10px;
    background: var(--paper);
    position: relative;
  }
  .box.dashed { border-style: dashed; }
  .box.fill-pink { background: var(--pink); }
  .box.fill-peach { background: var(--peach); }
  .box.fill-butter { background: var(--butter); }
  .box.fill-mint { background: var(--mint); }
  .box.fill-sky { background: var(--sky); }
  .box.fill-lilac { background: var(--lilac); }
  .box.fill-paper2 { background: var(--paper-2); }

  .row { display: flex; gap: 10px; }
  .col { display: flex; flex-direction: column; gap: 10px; }
  .grow { flex: 1; }

  .lbl-tiny { font-family: var(--mono); font-size: 10px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: .8px; }
  .lbl-hand { font-family: var(--sans); font-size: 14px; }
  .lbl-note { font-family: var(--serif); font-weight: 600; font-size: 22px; line-height: 1.05; letter-spacing: -.3px; }
  .lbl-scribble { font-family: var(--note); font-weight: 700; }
  .num-mono { font-family: var(--mono); font-size: 12px; }

  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 10px;
    border: 1.5px solid var(--rule);
    border-radius: 999px;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    background: var(--paper);
  }
  .pill.dot::before {
    content: ""; width: 8px; height: 8px; border-radius: 50%;
    background: var(--coral); border: 1px solid var(--rule);
  }
  .pill.coin { background: var(--butter); }
  .pill.gem { background: var(--lilac); }

  .btn-hand {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px;
    border: 1.5px solid var(--rule);
    border-radius: 10px;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    background: var(--paper);
    cursor: pointer;
  }
  .btn-hand.primary { background: var(--mint); }
  .btn-hand.warn { background: var(--coral); color: var(--paper); }

  /* 2048 tile */
  .grid-2048 {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
    background: var(--paper-2);
    padding: 8px; border: 1.75px solid var(--rule); border-radius: 12px;
    aspect-ratio: 1 / 1;
  }
  .tile {
    aspect-ratio: 1 / 1;
    border: 1.5px solid var(--rule);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--tile-num);
    font-weight: 700;
    color: var(--ink);
    background: var(--paper);
    box-shadow: 1.5px 1.5px 0 var(--rule);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
  }
  .tile.t0 { background: transparent; box-shadow: none; border-style: dashed; opacity: .35; }
  .tile.t2 { background: #f6ecd8; }
  .tile.t4 { background: var(--peach); }
  .tile.t8 { background: var(--pink); }
  .tile.t16 { background: var(--coral); color: var(--paper); }
  .tile.t32 { background: var(--butter); }
  .tile.t64 { background: var(--mint); }
  .tile.t128 { background: var(--sky); }
  .tile.t256 { background: var(--lilac); }
  .tile.t512 { background: var(--sage); color: var(--paper); }

  /* sparkline */
  .spark { display: block; width: 100%; height: 36px; }

  /* tweak panel positioning override */
  .footer-note {
    margin-top: 22px;
    border-top: 1.5px dashed var(--rule);
    padding-top: 10px;
    font-family: var(--sans);
    font-size: 12px;
    color: var(--ink-soft);
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 10px;
  }

  @media (max-width: 760px) {
    .notes { grid-template-columns: 1fr 1fr; }
    .app { padding: 16px; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
